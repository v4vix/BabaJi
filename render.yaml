services:
  # ── Main API service ──────────────────────────────────────────────────────────
  - type: web
    name: babaji-api
    runtime: python
    plan: free
    region: oregon
    rootDir: services/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      # ── Database ──────────────────────────────────────────────────────────────
      # Set DATABASE_URL in the Render dashboard to your Neon or Supabase
      # postgresql:// connection string. TLS is enforced automatically.
      - key: DATABASE_URL
        sync: false

      # ── Secrets (Render auto-generates cryptographically random values) ────
      - key: API_SECRET
        generateValue: true
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ACCOUNT_PASSWORD
        generateValue: true    # find value in dashboard → babaji-api → Environment

      # ── URLs ──────────────────────────────────────────────────────────────
      - key: APP_BASE_URL
        value: https://babaji-web.onrender.com
      - key: ALLOW_INSECURE_DEMO_AUTH
        value: "false"

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://babaji-web.onrender.com

      # ── Demo seeding ──────────────────────────────────────────────────────
      - key: SEED_DEMO_ACCOUNTS
        value: "true"
      - key: EXPOSE_SEED_ACCOUNT_CATALOG
        value: "true"
      - key: ADMIN_EMAILS
        value: admin@babaji.app
      - key: SUPPORT_EMAILS
        value: support@babaji.app

      # ── Inter-service wiring ───────────────────────────────────────────────
      - key: KB_SERVICE_URL
        value: https://babaji-kb.onrender.com

      # ── AI keys — waterfall: Ollama → Groq → OpenAI → Anthropic ──────────
      - key: GROQ_API_KEY
        sync: false            # free tier — https://console.groq.com
      - key: OPENAI_API_KEY
        sync: false            # gpt-4o-mini, cheap paid fallback
      - key: OPENAI_BASE_URL
        sync: false            # default: https://api.openai.com/v1
      - key: OPENAI_MODEL
        sync: false            # default: gpt-4o-mini
      - key: ANTHROPIC_API_KEY
        sync: false            # claude-haiku, final cloud fallback

      # ── Optional — Stripe ─────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PLUS
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ELITE
        sync: false

      # ── Optional — Email ──────────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@babaji.app

      # ── Optional — Sentry ─────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

  # ── Knowledge Base service ────────────────────────────────────────────────────
  - type: web
    name: babaji-kb
    runtime: python
    plan: free
    region: oregon
    rootDir: services/kb
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ADMIN_API_TOKEN
        fromService:
          name: babaji-api
          type: web
          envVarKey: ADMIN_API_TOKEN
      - key: DATABASE_URL
        sync: false            # same Neon/Supabase URL as babaji-api

  # ── Next.js Web App ───────────────────────────────────────────────────────────
  - type: web
    name: babaji-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm --filter web build
    startCommand: cd apps/web && corepack pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NEXT_PUBLIC_API_BASE
        value: https://babaji-api.onrender.com
      # ── Optional ──────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_ANALYTICS_ID
        sync: false

# ── Upgrade path: Render-managed Postgres ─────────────────────────────────────
# When moving off free external DB, uncomment this block, remove the
# sync:false DATABASE_URL entries above, and replace with fromDatabase refs.
#
# databases:
#   - name: babaji-db
#     plan: basic-256mb
#     region: oregon
#     databaseName: babaji
#     user: babaji
#     ipAllowList: []
