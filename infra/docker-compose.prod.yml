# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets come from a .env file (never committed). Copy .env.example → .env
# and fill in real values before running.

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cortex}
    # No direct port exposure in prod — only internal network
    ports: []

  redis:
    ports: []

  neo4j:
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports: []

  ollama:
    ports: []

  livekit:
    ports: []

  api:
    image: python:3.11-slim
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cortex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cortex}
      API_SECRET: ${API_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PLUS: ${STRIPE_PRICE_PLUS}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
      STRIPE_PRICE_ELITE: ${STRIPE_PRICE_ELITE}
      APPLE_WEBHOOK_SECRET: ${APPLE_WEBHOOK_SECRET}
      GOOGLE_WEBHOOK_SECRET: ${GOOGLE_WEBHOOK_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@babaji.app}
      APP_BASE_URL: ${APP_BASE_URL}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      SUPPORT_EMAILS: ${SUPPORT_EMAILS}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      CORS_ORIGINS: ${APP_BASE_URL}
      KB_SERVICE_URL: http://kb:8102
      KG_SERVICE_URL: http://kg:8103
      MEDIA_SERVICE_URL: http://media:8104
      LLM_BASE_URL: http://ollama:11434/v1
      LIVEKIT_URL: ws://livekit:7880
      SENTRY_DSN: ${SENTRY_DSN}
    ports: []

  kb:
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cortex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cortex}
    ports: []

  kg:
    restart: unless-stopped
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    ports: []

  media:
    restart: unless-stopped
    ports: []

  agents:
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_SECRET: ${API_SECRET}
    ports: []

  web:
    image: node:22-slim
    working_dir: /workspace
    restart: unless-stopped
    volumes:
      - ..:/workspace
    command: >
      bash -lc "corepack enable && corepack pnpm --filter web start"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE: ""
      NODE_ENV: production
    ports: []

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  caddy_data:
  caddy_config:
